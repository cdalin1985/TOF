name: Supabase keep-alive

# Free-tier Supabase projects pause after ~7 days of inactivity, which would
# take TOF offline between league nights until someone manually restores it.
# This job pings the REST API every 6 days so the project stays active.
#
# The token below is the Supabase "anon public" key (role: anon). It is safe to
# commit: it is already embedded in the deployed frontend bundle and is gated by
# row-level security — it grants no more than any visitor to the app already has.
# That is why no GitHub secret is required.
#
# Note: GitHub only runs scheduled workflows from the DEFAULT branch (main).
# Also, 6 days leaves ~1 day of margin before the 7-day pause; if a scheduled
# run is ever delayed/skipped, lower the interval (e.g. */3 or */4).

on:
  schedule:
    - cron: '17 6 */6 * *'  # every 6 days at ~06:17 UTC
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNxY3Ftb3Zza3BveXV0ZnlzbHltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMTAyNTksImV4cCI6MjA5NTc4NjI1OX0.QpySvysSF1vTGu1k-X9OIr9ZwEZAcuEqQpacx3XZdns
        run: |
          set -euo pipefail
          status=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "https://sqcqmovskpoyutfyslym.supabase.co/rest/v1/rankings?select=position&limit=1")
          echo "Supabase keep-alive ping returned HTTP $status"
          if [ "$status" != "200" ]; then
            echo "::error::Keep-alive ping failed (HTTP $status) — project may be paused." >&2
            exit 1
          fi
