<html>
  <body style="margin:0;padding:0;background-color:#0d0d0d;font-family:Arial,Helvetica,sans-serif;">
    <div style="max-width:480px;margin:0 auto;padding:32px 24px;">
      <h1 style="color:#E8E2D6;font-size:22px;letter-spacing:2px;text-align:center;margin-bottom:8px;">
        TOP OF THE FALLS
      </h1>
      <p style="color:#9CA3AF;font-size:12px;letter-spacing:3px;text-transform:uppercase;text-align:center;margin-top:0;">
        Great Falls Pool Challenge List
      </p>
      <div style="background-color:#1a1a1a;border:1px solid #2e2e2e;border-radius:12px;padding:28px 20px;margin-top:24px;text-align:center;">
        <p style="color:#E8E2D6;font-size:16px;margin:0 0 16px;">
          You've been invited to join the Top of the Falls challenge list.
        </p>
        <a href="{{ .ConfirmationURL }}"
           style="display:inline-block;background-color:#16A34A;color:#ffffff;text-decoration:none;font-size:16px;font-weight:bold;padding:12px 28px;border-radius:8px;margin-top:8px;">
          Accept Invite
        </a>
        <p style="color:#71717A;font-size:13px;margin:20px 0 0;">
          This link signs you in — then claim your name from the player list.
        </p>
      </div>
      <p style="color:#52525B;font-size:12px;text-align:center;margin-top:24px;">
        If you weren't expecting this invite, you can safely ignore this email.
      </p>
    </div>
  </body>
</html>
