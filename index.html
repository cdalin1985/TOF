<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/toc-icon.svg" />

    <!-- Removed maximum-scale=1.0 and user-scalable=no — they were blocking pinch-zoom (a11y / WCAG 1.4.4).
         Added viewport-fit=cover so the dark background extends behind the iPhone notch. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Page description (was missing) -->
    <meta name="description" content="Great Falls Pool Challenge List — Competitive rankings and challenges. Track your matches, climb the rankings, and defend your spot." />

    <meta name="theme-color" content="#16A34A" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TOTF" />

    <!-- Open Graph: rich previews when toc.monster is shared in iMessage / Slack / Discord / etc. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Top of the Falls" />
    <meta property="og:title" content="Top of the Falls — Great Falls Pool Challenge List" />
    <meta property="og:description" content="Track your matches. Climb the ladder. Defend your spot." />
    <meta property="og:url" content="https://toc.monster/" />
    <meta property="og:image" content="https://toc.monster/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Top of the Falls — Great Falls Pool Challenge List" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Top of the Falls — Great Falls Pool Challenge List" />
    <meta name="twitter:description" content="Track your matches. Climb the ladder. Defend your spot." />
    <meta name="twitter:image" content="https://toc.monster/og-image.png" />

    <title>Top of the Falls — Great Falls Pool Challenge List</title>
    <link rel="manifest" href="/manifest.json" />

    <!-- Fonts: trimmed from 4 families to 3 (Teko dropped — overlapped Bebas Neue's job).
         Barlow trimmed from 5 weights to 2 (400 + 600). Saves ~6 font-file requests on first paint. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600&family=Azeret+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
